services:
  # Production: tracks `main`. URL: https://microciv.onrender.com
  - type: web
    name: microciv
    runtime: static
    branch: main
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate

  # Staging: tracks `staging`. URL: https://microciv-staging.onrender.com
  # Push experimental work to the `staging` branch first, verify on-device,
  # then merge to `main` for production.
  - type: web
    name: microciv-staging
    runtime: static
    branch: staging
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Robots-Tag
        value: noindex
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
